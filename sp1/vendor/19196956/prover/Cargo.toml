[package]
version = "0.1.0"
name = "zkp_ecc-prover"
edition = "2021"
default-run = "prove"

[[bin]]
name = "prove"
path = "prove.rs"

[dependencies]
sp1-sdk = { version = "6.0.2", features = ["blocking", "native-gnark", "network"] }
sp1-cluster-utils = { git = "https://github.com/succinctlabs/sp1-cluster.git", tag = "v2.0.3" }
sp1-cluster-common = { git = "https://github.com/succinctlabs/sp1-cluster.git", tag = "v2.0.3" }
tokio = { version = "1.0", features = ["rt-multi-thread", "macros"] }
clap = { version = "4.0", features = ["derive", "env"] }
hex = "0.4.3"
zkp_ecc-lib = { path = "../lib" }
rkyv = "0.8.15"
chrono = "0.4.43"
bincode = "1.3.3"

[build-dependencies]
sp1-build = { version = "6.0.2" }
