[package]
version = "0.0.0"
name = "example_zkp_prove"
edition = "2021"

[[bin]]
name = "zkp_prove"
path = "zkp_prove.rs"

[dependencies]
sp1-sdk = { version = "6.0.2", features = ["blocking", "native-gnark", "network"] }
tokio = { version = "1.0", features = ["rt-multi-thread", "macros"] }
clap = { version = "4.0", features = ["derive", "env"] }
hex = "0.4.3"
zkp_ecc-lib = { path = "../../../lib" }
rkyv = "0.8.15"
chrono = "0.4.43"
bincode = "1.3.3"
